  "'olla' is irregular: minä olen, hän on, he ovat": "'olla' অনিয়মিত: minä olen, hän on, he ovat",
  "Vowel harmony": "স্বরসঙ্গতি",
  "A word's vowels are either back (a, o, u) or front (ä, ö, y) — they never mix inside one word. That is why most endings come in two shapes: -ssa / -ssä. The vowels e and i are neutral and fit either group.": "একটি শব্দের স্বরবর্ণ হয় পশ্চাৎ-স্বর (a, o, u), নয়তো সম্মুখ-স্বর (ä, ö, y) — একই শব্দের ভিতরে এরা কখনো মেশে না। এ কারণেই বেশির ভাগ প্রত্যয়ের দুটি রূপ থাকে: -ssa / -ssä। e ও i স্বর দুটি নিরপেক্ষ, উভয় দলের সঙ্গেই খাপ খায়।",
  "house → in the house (back vowels → -ssa)": "বাড়ি → বাড়িতে (পশ্চাৎ-স্বর → -ssa)",
  "kitchen → in the kitchen (front vowels → -ssä)": "রান্নাঘর → রান্নাঘরে (সম্মুখ-স্বর → -ssä)",
  "lake → in the lake (ä rules → -ssä even with neutral e)": "হ্রদ → হ্রদে (ä নিয়ন্ত্রণ করে → নিরপেক্ষ e থাকা সত্ত্বেও -ssä)",
  "Back vowels pull -a; front vowels pull -ä.": "পশ্চাৎ-স্বর টানে -a; সম্মুখ-স্বর টানে -ä।",
  "A word's vowels are either back (a, o, u) or front (ä, ö, y). e and i are neutral and fit both.": "শব্দের স্বর হয় পশ্চাৎ (a, o, u), নয় সম্মুখ (ä, ö, y)। e ও i নিরপেক্ষ, দুই দলেই চলে।",
  "Wrong ending: 'kylässa' should be kylässä. Check the word's vowels BEFORE adding the ending.": "ভুল প্রত্যয়: 'kylässa' নয়, হবে kylässä। প্রত্যয় যোগ করার আগেই শব্দের স্বরগুলো দেখে নিন।",
  "only e/i in the word → front endings": "শব্দে কেবল e/i থাকলে → সম্মুখ-স্বরের প্রত্যয়",
  "loanwords can break harmony": "বিদেশি ঋণশব্দ সঙ্গতি ভাঙতে পারে",
  "in a compound, the last part decides": "সমাসবদ্ধ শব্দে শেষ অংশই নির্ধারণ করে",
  "Consonant gradation (k, p, t)": "ব্যঞ্জন পরিবর্তন (k, p, t)",
  "k, p and t alternate between a strong and a weak grade when an ending closes the syllable. Common pairs: kk→k, pp→p, tt→t, t→d, p→v, k→(disappears), nk→ng, nt→nn, mp→mm, lt→ll, rt→rr.": "প্রত্যয় যোগ হয়ে সিলেবল বন্ধ হলে k, p ও t সবল ও দুর্বল রূপের মধ্যে বদলায়। প্রচলিত জোড়া: kk→k, pp→p, tt→t, t→d, p→v, k→(লোপ পায়), nk→ng, nt→nn, mp→mm, lt→ll, rt→rr।",
  "shop → in the shop (pp→p)": "দোকান → দোকানে (pp→p)",
  "table → on the table (t→d)": "টেবিল → টেবিলের উপর (t→d)",
  "Helsinki → in Helsinki (nk→ng)": "হেলসিঙ্কি → হেলসিঙ্কিতে (nk→ng)",
  "An ending closes the syllable → weak grade.": "প্রত্যয় সিলেবল বন্ধ করলে → দুর্বল রূপ।",
  "When an ending closes the syllable, k/p/t weakens (pankki → pankissa). The strong grade returns in an open syllable.": "প্রত্যয় সিলেবল বন্ধ করলে k/p/t দুর্বল হয় (pankki → pankissa)। সিলেবল খোলা থাকলে সবল রূপ ফিরে আসে।",
  "Forgetting gradation: it's 'pankissa' not 'pankkissa', 'tutkinnon' not 'tutkinton'.": "পরিবর্তন ভুলে যাওয়া: 'pankkissa' নয়, 'pankissa'; 'tutkinton' নয়, 'tutkinnon'।",
  "k → j, not the usual disappearance": "k → j, স্বাভাবিক লোপ নয়",
  "k → j, same as aika": "k → j, aika-র মতোই",
  "nt → nn (not just t → d)": "nt → nn (শুধু t → d নয়)",
  "no k/p/t → no gradation": "k/p/t নেই → পরিবর্তনও নেই",
  "Verb types 1–6": "ক্রিয়ার ধরন ১–৬",
  "Verbs fall into six types by how the infinitive ends: 1 -a/-ä (puhua), 2 -da/-dä (juoda), 3 -la/-na/-ra/-ta (tulla, mennä), 4 -ata (haluta), 5 -ita (tarvita), 6 -eta (vanheta). The type tells you which stem to use before the person ending.": "ইনফিনিটিভ (অভিধান-রূপ) কীভাবে শেষ হয়, তার ভিত্তিতে ক্রিয়া ছয় ধরনের: ১ -a/-ä (puhua), ২ -da/-dä (juoda), ৩ -la/-na/-ra/-ta (tulla, mennä), ৪ -ata (haluta), ৫ -ita (tarvita), ৬ -eta (vanheta)। ধরন থেকেই বোঝা যায় পুরুষ-প্রত্যয়ের আগে কোন শব্দমূল বসবে।",
  "Type 1: to say → I say": "ধরন ১: বলা → আমি বলি",
  "Type 2: to eat → I eat": "ধরন ২: খাওয়া → আমি খাই",
  "Type 3: to come → I come (type 3 adds -e-)": "ধরন ৩: আসা → আমি আসি (ধরন ৩-এ -e- যুক্ত হয়)",
  "Read the infinitive ending → name the type → take the right stem.": "ইনফিনিটিভের শেষ দেখুন → ধরন চিনুন → সঠিক শব্দমূল নিন।",
  "The infinitive ending tells you the type AND the stem. Always learn a verb together with its type.": "ইনফিনিটিভের শেষাংশই ধরন ও শব্দমূল — দুটোই জানিয়ে দেয়। ক্রিয়া শেখার সময় সবসময় তার ধরনসহ শিখুন।",
  "Using the dictionary form as the stem: haluta → NOT 'halutan', but halua- → haluan.": "অভিধান-রূপকেই শব্দমূল ধরে নেওয়া: haluta → 'halutan' নয়, বরং halua- → haluan।",
  "type 3 but irregular": "ধরন ৩, তবে অনিয়মিত",
  "the d disappears (teke- → tee-)": "d লোপ পায় (teke- → tee-)",
  "like tehdä": "tehdä-র মতো",
  "s → kse in the stem": "শব্দমূলে s → kse",
  "Present tense & person endings": "বর্তমান কাল ও পুরুষ-প্রত্যয়",
  "A Finnish verb changes for six persons. Endings: minä -n, sinä -t, hän - (lengthened vowel), me -mme, te -tte, he -vat/-vät. Take the stem and add the ending.": "ফিনিশ ক্রিয়া ছয়টি পুরুষে বদলায়। প্রত্যয়: minä -n, sinä -t, hän – (শেষ স্বর দীর্ঘ হয়), me -mme, te -tte, he -vat/-vät। শব্দমূল নিন, তার সঙ্গে প্রত্যয় যোগ করুন।",
  "to speak: I speak, you speak": "বলা: আমি বলি, তুমি বলো",
  "he/she speaks (final vowel doubles)": "সে বলে (শেষ স্বর দ্বিগুণ হয়)",
  "we speak, they speak": "আমরা বলি, তারা বলে",
  "hän = lengthen the final vowel; he = -vat/-vät.": "hän = শেষ স্বর দীর্ঘ করুন; he = -vat/-vät।",
  "The personal ending shows who: -n, -t, -Ø/-ee, -mme, -tte, -vat. The hän form lengthens the vowel (asuu).": "পুরুষ-প্রত্যয়ই বলে দেয় কে করছে: -n, -t, -Ø/-ee, -mme, -tte, -vat। hän-রূপে শেষ স্বর দীর্ঘ হয় (asuu)।",
  "Dropping the ending because the pronoun is there: say 'puhun', not 'minä puhu'.": "সর্বনাম আছে বলে প্রত্যয় বাদ দেওয়া: 'minä puhu' নয়, বলুন 'puhun'।",
  "not 'olee' but on": "'olee' নয়, বরং on",
  "the teke- stem returns": "teke- শব্দমূল ফিরে আসে",
  "the näke- stem": "näke- শব্দমূল",
  "The negative verb": "না-বাচক ক্রিয়া",
  "Negation uses a separate negative verb that conjugates: en, et, ei, emme, ette, eivät. The main verb stays as the bare short stem with no person ending.": "নেতিবাচক করতে আলাদা একটি না-বাচক ক্রিয়া ব্যবহৃত হয়, যা পুরুষ অনুযায়ী বদলায়: en, et, ei, emme, ette, eivät। মূল ক্রিয়াটি পুরুষ-প্রত্যয় ছাড়া খালি সংক্ষিপ্ত শব্দমূল হিসেবেই থাকে।",
  "I speak → I don't speak": "আমি বলি → আমি বলি না",
  "he comes → he doesn't come": "সে আসে → সে আসে না",
  "they eat → they don't eat": "তারা খায় → তারা খায় না",
  "The negative verb carries the person; the main verb drops its ending.": "না-বাচক ক্রিয়া পুরুষ বহন করে; মূল ক্রিয়া তার প্রত্যয় ছেড়ে দেয়।",
  "The negative verb (en, et, ei…) conjugates; the main verb stays as a stem. A negative object is partitive.": "না-বাচক ক্রিয়া (en, et, ei…) পুরুষ অনুযায়ী বদলায়; মূল ক্রিয়া শব্দমূল হয়েই থাকে। নেতিবাচক বাক্যের কর্ম পার্টিটিভে বসে।",
  "'minä ei' is wrong → minä en. And the object: 'en osta auton' → en osta autoa.": "'minä ei' ভুল → minä en। আর কর্ম: 'en osta auton' → en osta autoa।",
  "'olla' negated = ei ole": "'olla'-র নেতিবাচক = ei ole",
  "the imperative negative is its own verb": "অনুজ্ঞার নেতিবাচক রূপের নিজস্ব ক্রিয়া আছে",
  "Past tense (imperfect)": "অতীত কাল (ইমপারফেক্ট)",
  "The past is formed with the marker -i- between the stem and the person ending: puhu-i-n (I spoke). Sometimes -i- changes the stem vowel (osta → ostin; saada → sain). Negative: en puhunut (the NUT-participle).": "শব্দমূল ও পুরুষ-প্রত্যয়ের মাঝে -i- চিহ্ন বসিয়ে অতীত কাল গঠিত হয়: puhu-i-n (আমি বলেছিলাম)। কখনো -i- শব্দমূলের স্বর বদলে দেয় (osta → ostin; saada → sain)। নেতিবাচক: en puhunut (NUT-কৃদন্ত)।",
  "I speak → I spoke": "আমি বলি → আমি বলেছিলাম",
  "I go → I went": "আমি যাই → আমি গিয়েছিলাম",
  "I didn't speak": "আমি বলিনি",
  "-i- = past; negative + -nut/-nyt.": "-i- = অতীত; নেতিবাচকে -nut/-nyt।",
  "-i- is the past-tense marker. The negative uses the NUT-participle (en puhunut), not -i-.": "-i- অতীত কালের চিহ্ন। নেতিবাচকে -i- নয়, NUT-কৃদন্ত ব্যবহৃত হয় (en puhunut)।",
  "-i- in the negative: 'en puhuin' → en puhunut. Plural: emme puhuneet.": "নেতিবাচকে -i- বসানো: 'en puhuin' → en puhunut। বহুবচনে: emme puhuneet।",
  "-tää → -si- (t → s)": "-tää → -si- (t → s)",
  "y → v irregularly": "y → v, অনিয়মিতভাবে",
  "Perfect & pluperfect": "পুরাঘটিত বর্তমান ও পুরাঘটিত অতীত",
  "Perfect: olla (present) + NUT-participle — 'olen tehnyt' (it has happened, still relevant now). Pluperfect: olla (past) + NUT — 'olin tehnyt' (a past before another past). Negative: en ole tehnyt / en ollut tehnyt.": "পুরাঘটিত বর্তমান: olla (বর্তমান) + NUT-কৃদন্ত — 'olen tehnyt' (ঘটে গেছে, কিন্তু এখনো প্রাসঙ্গিক)। পুরাঘটিত অতীত: olla (অতীত) + NUT — 'olin tehnyt' (আরেক অতীতের আগের অতীত)। নেতিবাচক: en ole tehnyt / en ollut tehnyt।",
  "I have lived in Finland since 2024": "আমি ২০২৪ সাল থেকে ফিনল্যান্ডে বাস করছি",
  "I have already completed the degree": "আমি ডিগ্রিটি ইতিমধ্যেই শেষ করেছি",
  "I had studied Finnish before moving": "স্থানান্তরের আগেই আমি ফিনিশ পড়েছিলাম",
  "olla + -nut/-nyt (sing.), -neet (plural).": "olla + -nut/-nyt (একবচন), -neet (বহুবচন)।",
  "The perfect ties the past to now: 'olen tehnyt' = an experience or an ongoing situation. In the plural the participle is -neet.": "পুরাঘটিত বর্তমান অতীতকে এখনের সঙ্গে যুক্ত করে: 'olen tehnyt' = অভিজ্ঞতা বা চলমান অবস্থা। বহুবচনে কৃদন্তটি হয় -neet।",
  "Forgetting the plural participle: 'me olemme tehnyt' → me olemme tehneet.": "বহুবচনের কৃদন্ত ভুলে যাওয়া: 'me olemme tehnyt' → me olemme tehneet।",
  "irregular NUT": "অনিয়মিত NUT",
  "Conditional (-isi-)": "শর্তবাচক রূপ (-isi-)",
  "The conditional expresses a condition, a wish, or politeness. The marker -isi- goes between the stem and the person ending: puhu-isi-n = I would speak. Often with a jos- (if) clause.": "শর্তবাচক রূপ শর্ত, ইচ্ছা বা ভদ্রতা প্রকাশ করে। -isi- চিহ্নটি শব্দমূল ও পুরুষ-প্রত্যয়ের মাঝে বসে: puhu-isi-n = আমি বলতাম। প্রায়ই jos- (যদি) খণ্ডবাক্যের সঙ্গে ব্যবহৃত হয়।",
  "I would like coffee (polite).": "আমি কফি চাইতাম (ভদ্রভাবে)।",
  "If I had time…": "যদি আমার সময় থাকত…",
  "Would you go with me?": "তুমি কি আমার সঙ্গে যেতে?",
  "-isi- = 'would'.": "-isi- = 'would' (…তাম / …তে)।",
  "-isi- = 'would'. Use it for polite requests (saisinko?) and conditions (jos olisi…).": "-isi- = 'would'। ভদ্র অনুরোধ (saisinko?) ও শর্ত (jos olisi…) বোঝাতে এটি ব্যবহার করুন।",
  "Present tense in a polite request can sound blunt: 'saanko' → saisinko, 'voitko' → voisitko.": "ভদ্র অনুরোধে বর্তমান কাল রূঢ় শোনাতে পারে: 'saanko' → saisinko, 'voitko' → voisitko।",
  "the teke- stem": "teke- শব্দমূল",
  "the kävi- stem": "kävi- শব্দমূল",
  "Imperative (commands)": "অনুজ্ঞা (আদেশ)",
  "Singular command = the present-tense 'minä' stem minus -n: puhun → Puhu! Plural/polite: -kaa/-kää — Puhukaa! Negative: Älä puhu! / Älkää puhuko!": "একবচনে আদেশ = বর্তমান কালের 'minä'-রূপ থেকে -n বাদ: puhun → Puhu! বহুবচন/ভদ্র রূপ: -kaa/-kää — Puhukaa! নেতিবাচক: Älä puhu! / Älkää puhuko!",
  "Speak Finnish!": "ফিনিশ বলো!",
  "Don't be afraid!": "ভয় পেয়ো না!",
  "Come in! (pl./polite)": "ভিতরে আসুন! (বহুবচন/ভদ্র)",
  "Singular = 'minä' stem − n; negative = älä + stem.": "একবচন = 'minä'-রূপ − n; নেতিবাচক = älä + শব্দমূল।",
  "Get the singular command from the 'minä' form: puhun→puhu, tulen→tule. The negative uses the älä/älkää verb.": "একবচনের আদেশ 'minä'-রূপ থেকেই নিন: puhun→puhu, tulen→tule। নেতিবাচকে älä/älkää ক্রিয়া ব্যবহৃত হয়।",
  "Infinitive as a command: 'Puhua!' → Puhu! And 'Ei puhu!' → Älä puhu!": "ইনফিনিটিভকে আদেশ হিসেবে ব্যবহার: 'Puhua!' → Puhu! আর 'Ei puhu!' → Älä puhu!",
  "stem mene-": "শব্দমূল mene-",
  "irregular": "অনিয়মিত",
  "-tää → -si-": "-tää → -si-",
  "The passive": "কর্মবাচ্য (passive)",
  "The passive names no doer: 'Suomessa puhutaan suomea' (Finnish is spoken in Finland). Present: stem + -taan/-tään. Past: -ttiin. Negative: ei puhuta / ei puhuttu. In speech the passive doubles as 'we': 'me mennään' = we go.": "কর্মবাচ্যে কর্তার নাম থাকে না: 'Suomessa puhutaan suomea' (ফিনল্যান্ডে ফিনিশ বলা হয়)। বর্তমান: শব্দমূল + -taan/-tään। অতীত: -ttiin। নাবাচক: ei puhuta / ei puhuttu। কথ্য ভাষায় passive 'আমরা' অর্থেও চলে: 'me mennään' = আমরা যাই।",
  "Finnish is spoken here": "এখানে ফিনিশ বলা হয়",
  "the book was written in 2025": "বইটি ২০২৫ সালে লেখা হয়েছিল",
  "in Finland people sauna often": "ফিনল্যান্ডে প্রায়ই সাউনা করা হয়",
  "-taan/-tään = is done; -ttiin = was done.": "-taan/-tään = করা হয়; -ttiin = করা হয়েছিল।",
  "The passive = 'one does / it is done', with no subject. It's also the colloquial 'we' form (me tehdään).": "Passive = 'কেউ করে / করা হয়', কোনো কর্তা ছাড়াই। কথ্য ভাষায় এটি 'আমরা' রূপও (me tehdään)।",
  "Adding a subject: 'se puhutaan' → just puhutaan.": "কর্তা যোগ করা: 'se puhutaan' → শুধু puhutaan।",
  "a → e before -taan": "-taan-এর আগে a → e",
  "Potential mood (-ne-)": "সম্ভাবনাসূচক ভাব (-ne-)",
  "The potential expresses probability ('probably'): the marker -ne- goes between stem and ending. 'Tullee' = probably comes. The most common form is 'lienee' (= probably is). Rare, mostly written/news Finnish.": "Potential সম্ভাবনা বোঝায় ('সম্ভবত'): শব্দমূল ও প্রত্যয়ের মাঝে -ne- চিহ্ন বসে। 'Tullee' = সম্ভবত আসবে। সবচেয়ে প্রচলিত রূপ 'lienee' (= সম্ভবত আছে/হবে)। এটি বিরল, মূলত লেখ্য ও সংবাদের ফিনিশে।",
  "he'll probably come tomorrow": "সে সম্ভবত কাল আসবে",
  "that is probably true": "সেটা সম্ভবত সত্যি",
  "the matter will probably clear up soon": "বিষয়টি সম্ভবত শিগগিরই পরিষ্কার হবে",
  "-ne- = 'probably'.": "-ne- = 'সম্ভবত'।",
  "Rare and formal. At least recognise 'lienee'. In speech use 'varmaan/luultavasti' + present.": "বিরল ও আনুষ্ঠানিক। অন্তত 'lienee' চিনে রাখুন। কথায় 'varmaan/luultavasti' + বর্তমান কাল ব্যবহার করুন।",
  "Overusing it in speech: say 'hän varmaan tulee' rather than 'hän tullee'.": "কথায় এটি বেশি ব্যবহার করা: 'hän tullee'-র বদলে বলুন 'hän varmaan tulee'।",
  "lne → lle (not 'tulnee')": "lne → lle ('tulnee' নয়)",
  "suppletive": "সম্পূর্ণ ভিন্ন মূল থেকে আসা রূপ",
  "Participles": "Participle (ক্রিয়াজাত বিশেষণ)",
  "Participles are adjectives made from verbs and decline like adjectives. Active: VA (-va/-vä = 'doing') and NUT (-nut/-nyt = 'having done'). Passive: TU (-ttu/-tty = 'done') and TAVA (-ttava/-ttävä = 'to be done').": "Participle হলো ক্রিয়া থেকে তৈরি বিশেষণ, আর বিশেষণের মতোই কারকে রূপ বদলায়। কর্তৃবাচ্য: VA (-va/-vä = 'যে করছে') ও NUT (-nut/-nyt = 'যে করেছে')। কর্মবাচ্য: TU (-ttu/-tty = 'যা করা হয়েছে') ও TAVA (-ttava/-ttävä = 'যা করতে হবে')।",
  "a speaking man": "কথা-বলা লোকটি",
  "a completed degree": "সম্পন্ন করা ডিগ্রি",
  "a book to be written": "যে বইটি লিখতে হবে",
  "-va (doing), -nut (done, active), -tu (done, passive), -ttava (to be done).": "-va (করছে), -nut (করেছে, কর্তৃ), -tu (করা হয়েছে, কর্ম), -ttava (করতে হবে)।",
  "A participle agrees with its noun (suoritettu tutkinto → suoritetun tutkinnon). At higher levels they replace että-clauses.": "Participle তার বিশেষ্যের সঙ্গে মিলে যায় (suoritettu tutkinto → suoritetun tutkinnon)। উঁচু স্তরে এগুলো että-বাক্যাংশের বদলে বসে।",
  "Leaving it uninflected: 'suoritettu tutkinnon' → suoritetun tutkinnon.": "রূপ না বদলানো: 'suoritettu tutkinnon' → suoritetun tutkinnon।",
  "Infinitives": "Infinitive সমূহ",
  "The 1st infinitive = the dictionary form (puhua). The 3rd infinitive shows activity in cases: -maan (menen syömään = to), -massa (olen syömässä = in the middle of), -masta (tulen syömästä = from), -malla (by doing), -matta (without doing). The 2nd infinitive: -essa (tehdessä = while doing).": "১ম infinitive = অভিধানের রূপ (puhua)। ৩য় infinitive কাজটিকে কারকে বসায়: -maan (menen syömään = -তে), -massa (olen syömässä = -র মাঝখানে), -masta (tulen syömästä = থেকে), -malla (করে/দিয়ে), -matta (না করে)। ২য় infinitive: -essa (tehdessä = করার সময়)।",
  "I go to study": "আমি পড়তে যাচ্ছি",
  "I'm out at work": "আমি কাজে গিয়ে আছি",
  "I learn Finnish by doing": "আমি করতে করতে ফিনিশ শিখি",
  "-maan (to), -massa (in), -masta (from), -malla (by).": "-maan (-তে), -massa (-এ), -masta (থেকে), -malla (দিয়ে)।",
  "The 3rd infinitive uses the same case logic as nouns: -maan = illative, -massa = inessive, -masta = elative.": "৩য় infinitive বিশেষ্যের মতোই কারক-যুক্তি মেনে চলে: -maan = illative, -massa = inessive, -masta = elative।",
  "1st infinitive after a motion verb: 'menen syödä' → menen syömään.": "গতিবাচক ক্রিয়ার পরে ১ম infinitive: 'menen syödä' → menen syömään।",
  "type-3 stem": "ধরন-৩ শব্দমূল",
  "type-4 stem": "ধরন-৪ শব্দমূল",
  "irregular stem": "অনিয়মিত শব্দমূল",
  "Modal construction (-en: juosten)": "প্রকার-গঠন (-en: juosten)",
  "The modal construction says HOW the main action happens. It's the 2nd infinitive instructive -en: \"Hän tuli juosten\" (he came running, = juoksemalla). Others: nauraen (laughing), itkien (crying), laulaen (singing). It answers \"how?\". The tone is literary; speech often uses the -malla form instead.": "এই গঠনটি বলে, মূল কাজটি কীভাবে ঘটছে। এটি ২য় infinitive-এর instructive -en: \"Hän tuli juosten\" (সে দৌড়াতে দৌড়াতে এলো, = juoksemalla)। আরও: nauraen (হাসতে হাসতে), itkien (কাঁদতে কাঁদতে), laulaen (গাইতে গাইতে)। এটি \"কীভাবে?\" প্রশ্নের উত্তর দেয়। সুরটি সাহিত্যিক; কথ্য ভাষায় প্রায়ই এর বদলে -malla রূপ ব্যবহৃত হয়।",
  "the child came running": "শিশুটি দৌড়াতে দৌড়াতে এলো",
  "she answered smiling": "সে হাসতে হাসতে উত্তর দিলো",
  "they walked along singing": "তারা গাইতে গাইতে হাঁটল",
  "-en = 'how' (2nd infinitive instructive).": "-en = 'কীভাবে' (২য় infinitive instructive)।",
  "-en describes the manner accompanying the main action, and can often be replaced with -malla (juosten ≈ juoksemalla).": "-en মূল কাজের সঙ্গী ভঙ্গিটি বোঝায়, আর প্রায়ই -malla দিয়ে বদলে দেওয়া যায় (juosten ≈ juoksemalla)।",
  "Confusing it with -essa: \"tehden\" (how) vs. \"tehdessä\" (while). -en is manner, -essa is time.": "-essa-র সঙ্গে গুলিয়ে ফেলা: \"tehden\" (কীভাবে) বনাম \"tehdessä\" (করার সময়)। -en ভঙ্গি বোঝায়, -essa সময়।",
  "2nd-infinitive stem": "২য়-infinitive শব্দমূল",
  "lexicalized manner expressions": "স্থির হয়ে যাওয়া ভঙ্গি-প্রকাশ",
  "The six local cases: a 3 × 2 grid": "ছয় স্থানকারক: ৩ × ২ ছক",
  "The six local cases form a grid. The columns are direction (where / from where / to where). The rows are inside vs. outside. Inside set: -ssa, -sta, -Vn. Outside set: -lla, -lta, -lle.": "ছয়টি স্থানকারক মিলে একটি ছক গড়ে তোলে। কলাম হলো দিক (কোথায় / কোথা থেকে / কোথায় যাচ্ছে)। সারি হলো ভিতরে বনাম উপরিতলে। ভিতরের সেট: -ssa, -sta, -Vn। উপরিতলের সেট: -lla, -lta, -lle।",
  "Where? in the house / on the table": "কোথায়? বাড়ির ভিতরে / টেবিলের উপরে",
  "From where? out of / off": "কোথা থেকে? ভিতর থেকে / উপর থেকে",
  "To where? into / onto": "কোথায় (যাচ্ছে)? ভিতরে / উপরে",
  "S-row = inside; L-row = on a surface. -ssa/-sta/-Vn vs. -lla/-lta/-lle.": "S-সারি = ভিতরে; L-সারি = উপরিতলে। -ssa/-sta/-Vn বনাম -lla/-lta/-lle।",
  "Inside series -ssa/-sta/-Vn (within) vs. surface series -lla/-lta/-lle (on a surface). Three questions: missä? mistä? mihin?": "ভিতরের সেট -ssa/-sta/-Vn (ভিতরে) বনাম উপরিতলের সেট -lla/-lta/-lle (উপরে)। তিনটি প্রশ্ন: missä? mistä? mihin?",
  "Mixing the two series: for places say 'Espoossa', not 'Espoolla'.": "দুই সেট মিশিয়ে ফেলা: স্থানের জন্য বলুন 'Espoossa', 'Espoolla' নয়।",
  "old locative, not 'kodissa'": "পুরোনো locative রূপ, 'kodissa' নয়",
  "some places take the surface series": "কিছু জায়গা উপরিতলের সেট নেয়",
  "frozen -na forms": "স্থির হয়ে যাওয়া -na রূপ",
  "Inessive -ssa/-ssä (where, inside?)": "Inessive -ssa/-ssä (কোথায়, ভিতরে?)",
  "The inessive answers missä? (where?) and means 'inside something'. The ending is -ssa or -ssä by vowel harmony, added to the stem.": "Inessive missä? (কোথায়?) প্রশ্নের উত্তর দেয় এবং 'কোনো কিছুর ভিতরে' বোঝায়। প্রত্যয় -ssa বা -ssä — স্বরসঙ্গতি অনুযায়ী — শব্দমূলের সঙ্গে যুক্ত হয়।",
  "house → in the house": "বাড়ি → বাড়ির ভিতরে",
  "Finland → in Finland": "ফিনল্যান্ড → ফিনল্যান্ডে",
  "shop → in the shop (kpt: pp→p)": "দোকান → দোকানে (kpt: pp→p)",
  "-ssa = inSSAide — within.": "-ssa = inSSAide — ভিতরে।",
  "-ssa/-ssä = missä? (inside). The ending is chosen by vowel harmony.": "-ssa/-ssä = missä? (ভিতরে)। প্রত্যয়টি বেছে নেওয়া হয় স্বরসঙ্গতি অনুযায়ী।",
  "A front-vowel word takes -ssä: 'kylässa' → kylässä.": "সম্মুখ-স্বরের শব্দে -ssä বসে: 'kylässa' → kylässä।",
  "'kotona' = at home, not kodissa": "'kotona' = বাড়িতে, kodissa নয়",
  "'outside', a frozen form": "'বাইরে' — একটি স্থির রূপ",
  "countries usually -ssa, but a few -lla": "দেশ সাধারণত -ssa নেয়, তবে কয়েকটি -lla",
  "Elative -sta/-stä (from inside?)": "Elative -sta/-stä (ভিতর থেকে?)",
  "The elative answers mistä? and means motion out of the inside of something. Ending -sta/-stä. It is also used for 'about a topic': to talk about something.": "Elative mistä? প্রশ্নের উত্তর দেয় এবং কোনো কিছুর ভিতর থেকে বেরিয়ে আসা বোঝায়। প্রত্যয় -sta/-stä। 'কোনো বিষয়ে' অর্থেও এটি ব্যবহৃত হয়: কোনো কিছু নিয়ে কথা বলা।",
  "house → out of the house": "বাড়ি → বাড়ির ভিতর থেকে",
  "Helsinki → from Helsinki (kpt: nk→ng)": "Helsinki → Helsinki থেকে (kpt: nk→ng)",
  "I'm talking about the weather.": "আমি আবহাওয়া নিয়ে কথা বলছি।",
  "-sta = out of the inSTAide.": "-sta = ভিতর (inSTAide) থেকে বাইরে।",
  "-sta/-stä = mistä? Also topic (puhua jostakin) and liking (pitää jostakin).": "-sta/-stä = mistä? এছাড়া বিষয় (puhua jostakin) এবং পছন্দ (pitää jostakin)।",
  "pitää + partitive is wrong: 'pidän suomea' → pidän suomesta / suomen kielestä.": "pitää + পার্টিটিভ ভুল: 'pidän suomea' → pidän suomesta / suomen kielestä।",
  "'from home', not 'kodista'": "'বাড়ি থেকে', 'kodista' নয়",
  "'from outside / by heart'": "'বাইরে থেকে' / 'মুখস্থ'",
  "Illative -Vn / -hVn / -seen (into?)": "Illative -Vn / -hVn / -seen (ভিতরে?)",
  "The illative answers mihin? (into). Three endings: 1) short vowel + n: double the vowel and add n (talo → taloon). 2) -hVn for one-syllable long-vowel words (maa → maahan). 3) -seen for two-or-more-syllable words ending in a long vowel (Espoo → Espooseen).": "Illative mihin? (কীসের ভিতরে) প্রশ্নের উত্তর দেয়। তিনটি প্রত্যয়: ১) হ্রস্ব স্বর + n: স্বরটি দ্বিগুণ করে n যোগ করুন (talo → taloon)। ২) -hVn — এক-সিলেবলের দীর্ঘ-স্বরযুক্ত শব্দে (maa → maahan)। ৩) -seen — দুই বা তার বেশি সিলেবলের দীর্ঘ-স্বরান্ত শব্দে (Espoo → Espooseen)।",
  "house → into the house": "বাড়ি → বাড়ির ভিতরে",
  "land → into the land (one syllable, long vowel)": "ভূমি → ভূমির ভিতরে (এক সিলেবল, দীর্ঘ স্বর)",
  "Espoo → to Espoo (2 syllables, long -oo → -seen)": "Espoo → Espoo-তে (২ সিলেবল, দীর্ঘ -oo → -seen)",
  "Long vowel + long word → -seen.": "দীর্ঘ স্বর + দীর্ঘ শব্দ → -seen।",
  "-Vn (short vowel), -hVn (one syllable), -seen (two+ syllables, long vowel). The illative keeps the strong grade.": "-Vn (হ্রস্ব স্বর), -hVn (এক সিলেবল), -seen (দুই বা তার বেশি সিলেবল, দীর্ঘ স্বর)। Illative সবল রূপ ধরে রাখে।",
  "-seen on a short word: 'taloseen' → taloon. Use -seen only on longer words (Espooseen).": "ছোট শব্দে -seen: 'taloseen' → taloon। -seen কেবল লম্বা শব্দে ব্যবহার করুন (Espooseen)।",
  "regular but very common": "নিয়মিত, তবে খুবই প্রচলিত",
  "surface-series places take -lle": "উপরিতল-সেটের জায়গাগুলো -lle নেয়",
  "maalle = to the countryside": "maalle = গ্রামাঞ্চলে",
  "Adessive -lla/-llä (on / by / have)": "Adessive -lla/-llä (উপরে / দিয়ে / আছে)",
  "The adessive means 'on/at the surface of something', the instrument ('by what?'), and possession (minulla on = I have). Ending -lla/-llä.": "Adessive বোঝায় 'কোনো কিছুর উপরিতলে', উপকরণ ('কী দিয়ে?'), এবং অধিকার (minulla on = আমার আছে)। প্রত্যয় -lla/-llä।",
  "table → on the table (kpt: t→d)": "টেবিল → টেবিলের উপরে (kpt: t→d)",
  "I go by bus.": "আমি বাসে করে যাই।",
  "I have a car (lit. on me is a car).": "আমার একটি গাড়ি আছে (আক্ষরিক অর্থে: আমার উপরে আছে একটি গাড়ি)।",
  "-lla = on a surface, by a means, and 'have'.": "-lla = উপরিতলে, উপকরণে, আর 'আছে'।",
  "-lla/-llä = on a surface, by a means, and possession (minulla on).": "-lla/-llä = উপরিতলে, কোনো উপকরণে, আর অধিকারে (minulla on)।",
  "For 'have' don't use a verb 'own' — use adessive + on: 'minä omistan auto' → minulla on auto.": "'আছে' বোঝাতে 'own' ধরনের ক্রিয়া নয় — adessive + on ব্যবহার করুন: 'minä omistan auto' → minulla on auto।",
  "surface-series cities": "উপরিতল-সেটের শহর",
  "koti doesn't use the surface series": "koti উপরিতলের সেট নেয় না",
  "Ablative -lta/-ltä (from a surface / person)": "Ablative -lta/-ltä (উপরিতল / ব্যক্তির কাছ থেকে)",
  "The ablative answers mistä? / keneltä? and means motion off a surface or away from a person. Ending -lta/-ltä.": "Ablative mistä? / keneltä? প্রশ্নের উত্তর দেয়, আর উপরিতল থেকে সরে যাওয়া বা কোনো ব্যক্তির কাছ থেকে আসা বোঝায়। প্রত্যয় -lta/-ltä।",
  "table → off the table": "টেবিল → টেবিলের উপর থেকে",
  "I got a letter from a friend.": "আমি এক বন্ধুর কাছ থেকে একটি চিঠি পেয়েছি।",
  "from the train station": "রেলস্টেশন থেকে",
  "-lta = off a surface, or from a person.": "-lta = উপরিতল থেকে, বা ব্যক্তির কাছ থেকে।",
  "-lta/-ltä = off a surface or from a person. Also feeling: tuntuu/näyttää/kuulostaa hyvältä.": "-lta/-ltä = উপরিতল থেকে বা ব্যক্তির কাছ থেকে। অনুভূতিতেও: tuntuu/näyttää/kuulostaa hyvältä।",
  "Don't use the elative for people: 'sain palautetta opettajasta' → opettajalta.": "ব্যক্তির ক্ষেত্রে elative নয়: 'sain palautetta opettajasta' → opettajalta।",
  "'from home' replaces 'kodilta'": "'বাড়ি থেকে' — 'kodilta'-র বদলে এটি বসে",
  "Allative -lle (onto / to a person)": "Allative -lle (উপরে / ব্যক্তির কাছে)",
  "The allative answers mihin? / kenelle? and means motion onto a surface or to a person. The ending is always -lle (no harmony variant).": "Allative mihin? / kenelle? প্রশ্নের উত্তর দেয়, আর উপরিতলের উপরে বা কোনো ব্যক্তির কাছে যাওয়া বোঝায়। প্রত্যয় সবসময় -lle (স্বরসঙ্গতির আলাদা রূপ নেই)।",
  "table → onto the table": "টেবিল → টেবিলের উপরে",
  "I give the book to you.": "আমি তোমাকে বইটি দিচ্ছি।",
  "I go to the market square.": "আমি বাজারে যাচ্ছি।",
  "-lle = always -lle, onto a surface or to a person.": "-lle = সবসময় -lle; উপরিতলে বা ব্যক্তির কাছে।",
  "-lle = mihin? / kenelle? The ending is ALWAYS -lle, no harmony variant.": "-lle = mihin? / kenelle? প্রত্যয় সবসময় -lle, স্বরসঙ্গতির আলাদা রূপ নেই।",
  "There is no '-llä' form: 'työnantajallä' → työnantajalle.": "'-llä' বলে কোনো রূপ নেই: 'työnantajallä' → työnantajalle।",
  "koti uses the inside series": "koti ভিতরের সেট নেয়",
  "Essive (-na/-nä)": "Essive কারক (-na/-nä)",
  "The essive answers 'as what? in what state?' and marks a role or state ('as a') and weekdays. 'Työskentelen ohjaajana' (I work as an instructor), 'maanantaina' (on Monday), 'lapsena' (as a child).": "Essive 'কী হিসেবে? কোন অবস্থায়?' প্রশ্নের উত্তর দেয়, আর ভূমিকা বা অবস্থা ('হিসেবে') এবং বারের নাম বোঝায়। 'Työskentelen ohjaajana' (আমি প্রশিক্ষক হিসেবে কাজ করি), 'maanantaina' (সোমবারে), 'lapsena' (শিশু অবস্থায়)।",
  "I work as an instructor": "আমি প্রশিক্ষক হিসেবে কাজ করি",
  "on Monday I have a course": "সোমবারে আমার একটি কোর্স আছে",
  "as a child I lived in Spain": "শিশু অবস্থায় আমি স্পেনে থাকতাম",
  "-na/-nä = 'as' (role, day, state).": "-na/-nä = 'হিসেবে' (ভূমিকা, বার, অবস্থা)।",
  "Essive = a temporary role/state AND weekdays. Compare: essive = state (as a teacher), translative = change (into a teacher).": "Essive = সাময়িক ভূমিকা/অবস্থা এবং বারের নাম। তুলনা করুন: essive = অবস্থা (শিক্ষক হিসেবে), translative = পরিবর্তন (শিক্ষক হয়ে ওঠা)।",
  "Nominative for a role: 'työskentelen kokki' → työskentelen kokkina.": "ভূমিকা বোঝাতে nominative: 'työskentelen kokki' → työskentelen kokkina।",
  "'tänä' only in the essive": "'tänä' কেবল essive-এ",
  "don't take the essive": "essive নেয় না",
  "Translative (-ksi)": "Translative কারক (-ksi)",
  "The translative answers 'into what? becoming what?' and marks change ('become'), purpose, and a set period. 'Opiskelen kääntäjäksi' (studying to become a translator), 'sää muuttui kylmäksi' (turned cold), 'kahdeksi viikoksi' (for two weeks).": "Translative 'কীসে? কী হয়ে উঠছে?' প্রশ্নের উত্তর দেয়, আর পরিবর্তন ('হয়ে ওঠা'), উদ্দেশ্য ও নির্দিষ্ট সময়সীমা বোঝায়। 'Opiskelen kääntäjäksi' (অনুবাদক হওয়ার জন্য পড়ছি), 'sää muuttui kylmäksi' (আবহাওয়া ঠান্ডা হয়ে গেল), 'kahdeksi viikoksi' (দুই সপ্তাহের জন্য)।",
  "I'm studying to become a translator": "আমি অনুবাদক হওয়ার জন্য পড়ছি",
  "the weather turned cold": "আবহাওয়া ঠান্ডা হয়ে গেল",
  "I came to Finland for two years": "আমি দুই বছরের জন্য ফিনল্যান্ডে এসেছি",
  "-ksi = 'into/for' (change, purpose, period).": "-ksi = 'হয়ে / জন্য' (পরিবর্তন, উদ্দেশ্য, সময়সীমা)।",
  "Translative = change into a state. The pair: essive (being) vs. translative (becoming). 'miksi?' is the translative of 'mikä'.": "Translative = কোনো অবস্থায় পরিবর্তিত হওয়া। জোড়াটি: essive (থাকা) বনাম translative (হয়ে ওঠা)। 'miksi?' হলো 'mikä'-র translative।",
  "Essive for a change: 'tulen iloisena' → tulen iloiseksi (= I become happy).": "পরিবর্তন বোঝাতে essive: 'tulen iloisena' → tulen iloiseksi (= আমি খুশি হয়ে উঠি)।",
  "with a possessive suffix: -kseni": "অধিকার-প্রত্যয়সহ: -kseni",
  "= translative of 'mikä'": "= 'mikä'-র translative",
  "Rare cases (abessive, comitative, instructive)": "বিরল কারক (abessive, comitative, instructive)",
  "Three rare cases: abessive -tta/-ttä ('without': rahatta), comitative -ine- ('with': perheineen = with one's family), instructive -in ('by means of': omin käsin = with one's own hands, jalan = on foot). Mostly in fixed expressions.": "তিনটি বিরল কারক: abessive -tta/-ttä ('ছাড়া': rahatta), comitative -ine- ('সঙ্গে': perheineen = পরিবারসহ), instructive -in ('দিয়ে': omin käsin = নিজের হাতে, jalan = পায়ে হেঁটে)। বেশির ভাগই স্থির বাগ্‌ধারায় টিকে আছে।",
  "I left without money": "আমি টাকা ছাড়াই রওনা দিলাম",
  "he came with his family": "সে পরিবারসহ এসেছিল",
  "I came on foot": "আমি পায়ে হেঁটে এসেছি",
  "-tta = without; -ine- = with; -in = by means of.": "-tta = ছাড়া; -ine- = সঙ্গে; -in = দিয়ে।",
  "These are C-level / frozen. In everyday Finnish 'ilman + partitive' and 'kanssa' are more common than the abessive and comitative.": "এগুলো C-স্তরের বা স্থির রূপ। দৈনন্দিন ফিনিশে abessive ও comitative-এর চেয়ে 'ilman + পার্টিটিভ' এবং 'kanssa' অনেক বেশি প্রচলিত।",
  "'rahatta' is formal; everyday Finnish says 'ilman rahaa'.": "'rahatta' আনুষ্ঠানিক; দৈনন্দিন ফিনিশে বলা হয় 'ilman rahaa'।",
  "the instructive survives in idioms": "বাগ্‌ধারায় instructive এখনো টিকে আছে",
  "the comitative requires a possessive suffix": "comitative-এ অধিকার-প্রত্যয় লাগে",
  "Partitive -a/-ä, -ta/-tä, -tta/-ttä": "পার্টিটিভ -a/-ä, -ta/-tä, -tta/-ttä",
  "The partitive marks a part, an unspecified amount, or an unfinished action. It is also the object in negative sentences, after numbers, and with many verbs. Endings: -a/-ä (talo→taloa), -ta/-tä (maa→maata), -tta/-ttä (some words, vesi→vettä).": "পার্টিটিভ বোঝায় অংশ, অনির্দিষ্ট পরিমাণ, বা অসমাপ্ত কাজ। নাবাচক বাক্যে, সংখ্যার পরে এবং অনেক ক্রিয়ার সঙ্গে কর্মও পার্টিটিভে বসে। প্রত্যয়: -a/-ä (talo→taloa), -ta/-tä (maa→maata), -tta/-ttä (কিছু শব্দে, vesi→vettä)।",
  "I drink (some) coffee.": "আমি (কিছুটা) কফি পান করি।",
  "I'm not buying a car (negative → partitive).": "আমি গাড়ি কিনছি না (নাবাচক → পার্টিটিভ)।",
  "three apples (after a number → partitive)": "তিনটি আপেল (সংখ্যার পরে → পার্টিটিভ)",
  "Part, negation, number, amount → partitive.": "অংশ, নাবাচকতা, সংখ্যা, পরিমাণ → পার্টিটিভ।",
  "Partitive: negation, ongoing action, indefinite amount, after a number. Endings -a/-ä, -ta/-tä, -tta/-ttä.": "পার্টিটিভ: নাবাচকতা, চলমান কাজ, অনির্দিষ্ট পরিমাণ, সংখ্যার পরে। প্রত্যয় -a/-ä, -ta/-tä, -tta/-ttä।",
  "Partitive after a number: 'kaksi euro' → kaksi euroa; 'kolme lapset' → kolme lasta.": "সংখ্যার পরে পার্টিটিভ: 'kaksi euro' → kaksi euroa; 'kolme lapset' → kolme lasta।",
  "old -i word: i → e, tt": "পুরোনো -i শব্দ: i → e, tt",
  "irregular stem miehe-": "অনিয়মিত শব্দমূল miehe-",
  "psi → s": "psi → s",
  "exceptional short partitive": "ব্যতিক্রমী সংক্ষিপ্ত পার্টিটিভ",
  "Genitive -n (possession)": "Genitive -n (অধিকার)",
  "The genitive ends in -n and shows possession ('of something / -'s'). It also precedes many postpositions: talon edessä = in front of the house. The genitive stem is often the stem other cases build on.": "Genitive -n দিয়ে শেষ হয় এবং অধিকার বোঝায় ('কোনো কিছুর / -র')। অনেক পরসর্গের আগেও এটি বসে: talon edessä = বাড়ির সামনে। Genitive-এর শব্দমূলের উপরেই প্রায়ই অন্য কারকগুলো গড়ে ওঠে।",
  "Liisa's = of Liisa → Liisan (the genitive stem)": "Liisa-র = Liisa → Liisan (genitive শব্দমূল)",
  "Liisa's book": "Liisa-র বই",
  "in front of the house": "বাড়ির সামনে",
  "-n at the end = 'whose?' possession.": "শেষে -n = 'কার?' অর্থাৎ অধিকার।",
  "-n = possession ('whose?') and the stem for many cases. Gradation often lands on the genitive.": "-n = অধিকার ('কার?') এবং বহু কারকের ভিত্তি-মূল। ব্যঞ্জন পরিবর্তন প্রায়ই genitive-এই ঘটে।",
  "Forgetting gradation: 'tutkinton' → tutkinnon; it's 'pankin' not 'pankkin'.": "ব্যঞ্জন পরিবর্তন ভুলে যাওয়া: 'tutkinton' → tutkinnon; হয় 'pankin', 'pankkin' নয়।",
  "stem vete-": "শব্দমূল vete-",
  "stem miehe-": "শব্দমূল miehe-",
  "-nen → -sen": "-nen → -sen",
  "number is irregular": "সংখ্যাটি অনিয়মিত",
  "Accusative object -n (whole/complete)": "Accusative কর্ম -n (সম্পূর্ণ/গোটা)",
  "When the action is complete and the object is whole, the singular object takes -n (it looks like the genitive). In the plural the object ending is -t, and personal pronouns take -t (minut, sinut, hänet).": "কাজ যখন সম্পূর্ণ এবং কর্মটি গোটা, তখন একবচনের কর্ম -n নেয় (দেখতে genitive-এর মতোই)। বহুবচনে কর্মের প্রত্যয় -t, আর পুরুষবাচক সর্বনাম নেয় -t (minut, sinut, hänet)।",
  "I'll buy the (whole) car → -n": "আমি (গোটা) গাড়িটি কিনব → -n",
  "We open the window.": "আমরা জানালাটি খুলি।",
  "Do you know him/her? (pronoun → -t)": "তুমি কি তাকে চেনো? (সর্বনাম → -t)",
  "Complete + whole → -n.": "সম্পূর্ণ + গোটা → -n।",
  "Whole object: singular -n, plural -t, pronouns their own -t form (minut, hänet).": "গোটা কর্ম: একবচনে -n, বহুবচনে -t, সর্বনামের নিজস্ব -t রূপ (minut, hänet)।",
  "-n for a pronoun is wrong: 'näen hänen' → näen hänet; 'hän tapasi minun' → minut.": "সর্বনামে -n ভুল: 'näen hänen' → näen hänet; 'hän tapasi minun' → minut।",
  "personal pronoun takes -t": "পুরুষবাচক সর্বনাম -t নেয়",
  "not 'hänen' as an object": "কর্ম হিসেবে 'hänen' নয়",
  "object of the question word": "প্রশ্নবাচক শব্দের কর্মরূপ",
  "Choosing the object: partitive vs. accusative": "কর্ম বাছাই: পার্টিটিভ বনাম accusative",
  "Decision tree: 1) Is the sentence negative? → partitive. 2) Is the action ongoing/incomplete? → partitive. 3) Is the amount indefinite / a mass noun? → partitive. Otherwise, when the result is complete and whole → accusative (-n / -t).": "সিদ্ধান্ত-ছক: ১) বাক্যটি কি নাবাচক? → পার্টিটিভ। ২) কাজটি কি চলমান/অসমাপ্ত? → পার্টিটিভ। ৩) পরিমাণ কি অনির্দিষ্ট বা বস্তুবাচক? → পার্টিটিভ। অন্যথায়, ফল যখন সম্পূর্ণ ও গোটা → accusative (-n / -t)।",
  "I'm reading the book (in progress, partitive) / I'll read the book (to the end, accusative).": "আমি বইটি পড়ছি (চলমান, পার্টিটিভ) / আমি বইটি পড়ে ফেলব (শেষ পর্যন্ত, accusative)।",
  "I'm not reading the book (negative → partitive).": "আমি বইটি পড়ছি না (নাবাচক → পার্টিটিভ)।",
  "I'm eating an apple (some of it) / I eat the (whole) apple.": "আমি আপেল খাচ্ছি (কিছুটা) / আমি (গোটা) আপেলটি খাই।",
  "Negative–ongoing–indefinite → P. Otherwise → -n.": "নাবাচক–চলমান–অনির্দিষ্ট → পার্টিটিভ। অন্যথায় → -n।",
  "Negative / ongoing / indefinite → partitive. Complete + whole → accusative.": "নাবাচক / চলমান / অনির্দিষ্ট → পার্টিটিভ। সম্পূর্ণ + গোটা → accusative।",
  "Always partitive in the negative: 'en osta auton' → en osta autoa.": "নাবাচকে সবসময় পার্টিটিভ: 'en osta auton' → en osta autoa।",
  "always partitive: rakastan sinua": "সবসময় পার্টিটিভ: rakastan sinua",
  "odotan bussia (not bussin)": "odotan bussia (bussin নয়)",
  "autan sinua": "autan sinua",
  "Verb government (verb + case)": "ক্রিয়ার কারক-শাসন (ক্রিয়া + কারক)",
  "Many verbs require a specific case that must be learned with the verb. E.g. pitää + elative (pidän kahvista = I like coffee), rakastua + illative (rakastuin Suomeen = I fell for Finland), osallistua + illative/allative, keskustella + elative (talk about), odottaa + partitive.": "অনেক ক্রিয়া একটি নির্দিষ্ট কারক দাবি করে, যা ক্রিয়ার সঙ্গেই শিখতে হয়। যেমন pitää + elative (pidän kahvista = আমি কফি পছন্দ করি), rakastua + illative (rakastuin Suomeen = আমি ফিনল্যান্ডের প্রেমে পড়েছি), osallistua + illative/allative, keskustella + elative (কোনো বিষয়ে আলোচনা করা), odottaa + পার্টিটিভ।",
  "I like the Finnish language (elative)": "আমি ফিনিশ ভাষা পছন্দ করি (elative)",
  "I take part in the course (allative)": "আমি কোর্সটিতে অংশ নিই (allative)",
  "I got to know the neighbour (illative)": "আমি প্রতিবেশীর সঙ্গে পরিচিত হলাম (illative)",
  "Learn a verb together with the case it takes.": "ক্রিয়াটি যে কারক নেয়, তার সঙ্গেই ক্রিয়াটি শিখুন।",
  "Government is learned verb by verb — the case doesn't always follow from meaning. Always note a new verb with an example sentence.": "কারক-শাসন ক্রিয়া ধরে ধরে শিখতে হয় — অর্থ দেখে কারক সবসময় বোঝা যায় না। নতুন ক্রিয়া সবসময় একটি উদাহরণ-বাক্যসহ টুকে রাখুন।",
  "English logic: 'odotan sinulle' → odotan sinua; 'pidän suomea' → pidän suomesta.": "ইংরেজির যুক্তি প্রয়োগ: 'odotan sinulle' → odotan sinua; 'pidän suomea' → pidän suomesta।",
  "'like' → elative": "'পছন্দ করা' → elative",
  "illative": "illative কারক",
  "always partitive": "সবসময় পার্টিটিভ",
  "The plural (plural cases)": "বহুবচন (বহুবচনের কারক)",
  "Basic plural -t (talot) only in the nominative. In other cases the plural marker is -i-/-j-: partitive -ja/-ia/-ita (taloja, maita), genitive -jen/-ien (talojen), inessive -issa (taloissa). The plural stem is built from the genitive.": "সাধারণ বহুবচন -t (talot) কেবল nominative-এ। অন্য কারকে বহুবচনের চিহ্ন -i-/-j-: পার্টিটিভ -ja/-ia/-ita (taloja, maita), genitive -jen/-ien (talojen), inessive -issa (taloissa)। বহুবচনের শব্দমূল গড়ে ওঠে genitive থেকে।",
  "two children → the children": "দুটি শিশু → শিশুরা",
  "I talk about many countries": "আমি অনেক দেশ নিয়ে কথা বলি",
  "I worked in many banks": "আমি অনেক ব্যাংকে কাজ করেছি",
  "-t only in the nominative; elsewhere -i-/-j-.": "-t কেবল nominative-এ; অন্য সব জায়গায় -i-/-j-।",
  "Only the nominative plural uses -t. Every other plural case is built with the -i-/-j- marker on the genitive stem.": "কেবল nominative বহুবচনে -t বসে। বাকি সব বহুবচন-কারক গড়ে ওঠে genitive শব্দমূলের উপর -i-/-j- চিহ্ন দিয়ে।",
  "-t as object/location: 'näen talot' (whole) vs. 'näen taloja' (partitive).": "কর্ম বা স্থানে -t: 'näen talot' (গোটা) বনাম 'näen taloja' (পার্টিটিভ)।",
  "yö → öi in the plural": "বহুবচনে yö → öi",
  "long vowel": "দীর্ঘ স্বর",
  "Adjective agreement": "বিশেষণের অন্বয়",
  "The adjective takes the same case and number as its noun. 'Isossa talossa' (in a big house) — both the adjective and the noun take -ssa. This holds in every case.": "বিশেষণ তার বিশেষ্যের মতোই একই কারক ও বচন নেয়। 'Isossa talossa' (বড় বাড়ির ভিতরে) — বিশেষণ ও বিশেষ্য দুটোতেই -ssa। এটি সব কারকেই প্রযোজ্য।",
  "a big house → in a big house": "একটি বড় বাড়ি → একটি বড় বাড়ির ভিতরে",
  "a beautiful flower → of a beautiful flower": "একটি সুন্দর ফুল → একটি সুন্দর ফুলের",
  "new shoes (plural agrees too)": "নতুন জুতো (বহুবচনেও অন্বয় ঘটে)",
  "The adjective copies the noun's ending.": "বিশেষণ বিশেষ্যের প্রত্যয়টিই নকল করে।",
  "The adjective takes the same case and number as its noun. The same ending on both.": "বিশেষণ তার বিশেষ্যের মতোই একই কারক ও বচন নেয়। দুটোতেই একই প্রত্যয়।",
  "Leaving the adjective in the base form: 'isossa talo' → isossa talossa; 'pitkä kokemuksen' → pitkän kokemuksen.": "বিশেষণকে মূল রূপে রেখে দেওয়া: 'isossa talo' → isossa talossa; 'pitkä kokemuksen' → pitkän kokemuksen।",
  "indeclinable adjectives": "রূপ-অপরিবর্তনীয় বিশেষণ",
  "don't decline: koko päivän, pikku juttu": "রূপ বদলায় না: koko päivän, pikku juttu",
  "Comparative & superlative": "তুলনাবাচক ও সর্বোচ্চবাচক",
  "Comparison: comparative -mpi (bigger), superlative -in (biggest). 'Kuin' links the things compared: isompi kuin = bigger than. The form still declines in cases: suuremmassa.": "তুলনা: comparative -mpi (আরও বড়), superlative -in (সবচেয়ে বড়)। 'Kuin' তুলনার দুই দিককে জোড়ে: isompi kuin = -র চেয়ে বড়। রূপটি কারকেও বদলায়: suuremmassa।",
  "big → bigger → biggest": "বড় → আরও বড় → সবচেয়ে বড়",
  "Helsinki is bigger than Espoo.": "Helsinki, Espoo-র চেয়ে বড়।",
  "best / better / good (irregular)": "সেরা / আরও ভালো / ভালো (অনিয়মিত)",
  "-mpi = more; -in = most.": "-mpi = আরও; -in = সবচেয়ে।",
  "-mpi = comparative, -in = superlative. 'kuin' = than. A few are irregular (hyvä→parempi→paras).": "-mpi = comparative, -in = superlative। 'kuin' = -র চেয়ে। কয়েকটি অনিয়মিত (hyvä→parempi→paras)।",
  "Double comparison: 'enemmän parempi' → just parempi. And 'hyvempi' → parempi.": "দ্বিগুণ তুলনা: 'enemmän parempi' → শুধু parempi। আর 'hyvempi' → parempi।",
  "fully irregular": "সম্পূর্ণ অনিয়মিত",
  "k → d / k → ∅": "k → d / k → ∅",
  "stem uude-": "শব্দমূল uude-",
  "Possessive suffix (-ni, -si, -nsa…)": "অধিকার-প্রত্যয় (-ni, -si, -nsa…)",
  "Possession can be shown by a suffix at the end of the word: -ni (my), -si (your), -nsa/-nsä (his/her), -mme (our), -nne (your pl.), -nsa (their). The genitive pronoun often accompanies it: minun autoni.": "শব্দের শেষে একটি প্রত্যয় দিয়ে অধিকার বোঝানো যায়: -ni (আমার), -si (তোমার), -nsa/-nsä (তার), -mme (আমাদের), -nne (তোমাদের), -nsa (তাদের)। সঙ্গে প্রায়ই genitive সর্বনামও থাকে: minun autoni।",
  "car → my car": "গাড়ি → আমার গাড়ি",
  "home → your home": "বাড়ি → তোমার বাড়ি",
  "my name is…": "আমার নাম…",
  "The suffix names the owner with no separate word.": "প্রত্যয়টিই মালিককে বুঝিয়ে দেয়, আলাদা কোনো শব্দ লাগে না।",
  "The possessive suffix comes AFTER the case ending, last (työssäni). The genitive pronoun is optional.": "অধিকার-প্রত্যয় বসে কারক-প্রত্যয়ের পরে, একদম শেষে (työssäni)। Genitive সর্বনামটি ঐচ্ছিক।",
  "Just the pronoun with no suffix is spoken-style: in written Finnish 'minun nimi' → minun nimeni.": "প্রত্যয় ছাড়া কেবল সর্বনাম — এটি কথ্য রীতি: লেখ্য ফিনিশে 'minun nimi' → minun nimeni।",
  "3rd person -nsa OR -Vn": "তৃতীয় পুরুষে -nsa অথবা -Vn",
  "-Vn after a vowel": "স্বরের পরে -Vn",
  "Predicative (olla + what kind)": "বিধেয়-বিশেষণ (olla + কেমন)",
  "The predicative is the complement after \"olla\". It's usually NOMINATIVE: \"Talo on iso\" (the house is big). But for a mass noun or an uncountable quality it's PARTITIVE: \"Vesi on kylmää\" (water is cold), \"Kahvi on hyvää.\" Plural kinds are often partitive: \"He ovat opiskelijoita.\"": "বিধেয়-বিশেষণ হলো \"olla\"-র পরের অংশ। সাধারণত এটি NOMINATIVE: \"Talo on iso\" (বাড়িটি বড়)। কিন্তু বস্তুবাচক বা অগণনীয় গুণের বেলায় এটি পার্টিটিভ: \"Vesi on kylmää\" (পানি ঠান্ডা), \"Kahvi on hyvää.\" বহুবচনে শ্রেণি বোঝালে প্রায়ই পার্টিটিভ: \"He ovat opiskelijoita.\"",
  "the house is big (nominative)": "বাড়িটি বড় (nominative)",
  "the water is cold (partitive — mass noun)": "পানি ঠান্ডা (পার্টিটিভ — বস্তুবাচক)",
  "they are students (plural partitive)": "তারা শিক্ষার্থী (বহুবচন পার্টিটিভ)",
  "Countable → nominative; mass/abstract → partitive.": "গণনীয় → nominative; বস্তুবাচক/বিমূর্ত → পার্টিটিভ।",
  "Mass nouns and abstract qualities take a partitive predicative (maito on hyvää, sää on kaunista). A single countable thing → nominative (auto on uusi).": "বস্তুবাচক ও বিমূর্ত গুণ পার্টিটিভ বিধেয় নেয় (maito on hyvää, sää on kaunista)। একটি গণনীয় বস্তু → nominative (auto on uusi)।",
  "\"Vesi on kylmä\" → kylmää; \"kahvi on hyvä\" (the coffee-item) vs. \"hyvää\" (the quality).": "\"Vesi on kylmä\" → kylmää; \"kahvi on hyvä\" (কফি-বস্তুটি) বনাম \"hyvää\" (গুণটি)।",
  "fixed partitive predicatives": "স্থির পার্টিটিভ বিধেয়",
  "plural kind → partitive": "বহুবচনে শ্রেণি → পার্টিটিভ",
  "Numbers & partitive": "সংখ্যা ও পার্টিটিভ",
  "Learn 0–10 by heart. After a number (except 'one') the noun is in the singular partitive: kaksi euroa, kolme lasta. Ordinals: ensimmäinen, toinen, kolmas…": "০–১০ মুখস্থ করে নিন। সংখ্যার পরে ('এক' ছাড়া) বিশেষ্য বসে একবচন পার্টিটিভে: kaksi euroa, kolme lasta। ক্রমবাচক: ensimmäinen, toinen, kolmas…",
  "two coffees": "দুই কাপ কফি",
  "three children": "তিনটি শিশু",
  "it's five o'clock": "এখন পাঁচটা বাজে",
  "A number (except one) → partitive.": "সংখ্যা (এক ছাড়া) → পার্টিটিভ।",
  "A number (except 1) → singular partitive. Big numbers are built from parts. Ordinals decline.": "সংখ্যা (১ ছাড়া) → একবচন পার্টিটিভ। বড় সংখ্যা অংশ জুড়ে গড়া হয়। ক্রমবাচক শব্দ কারকে রূপ বদলায়।",
  "Plural after a number: 'kaksi autot' → kaksi autoa; 'viisi vuotta', not 'viisi vuodet'.": "সংখ্যার পরে বহুবচন: 'kaksi autot' → kaksi autoa; হয় 'viisi vuotta', 'viisi vuodet' নয়।",
  "irregular genitive": "অনিয়মিত genitive",
  "ordinals 1st–2nd don't follow the -s pattern": "১ম–২য় ক্রমবাচক শব্দ -s ছাঁদ মানে না",
  "each part declines separately": "প্রতিটি অংশ আলাদাভাবে রূপ বদলায়",
  "Time expressions": "সময়-প্রকাশ",
  "Clock: 'kello on…'. Weekdays in the essive (maanantaina = on Monday). Months and years in the inessive (tammikuussa, vuonna 2024). Duration in the partitive (kaksi tuntia).": "ঘড়ি: 'kello on…'। বারের নাম essive-এ (maanantaina = সোমবারে)। মাস ও বছর inessive-এ (tammikuussa, vuonna 2024)। স্থিতিকাল পার্টিটিভে (kaksi tuntia)।",
  "it's three o'clock": "এখন তিনটা বাজে",
  "on Monday": "সোমবারে",
  "in 2024": "২০২৪ সালে",
  "When? day → -na; month → -ssa.": "কখন? বার → -na; মাস → -ssa।",
  "Day → essive (maanantaina). Month/year → inessive (elokuussa). Part of day → adessive (aamulla). Duration → partitive.": "বার → essive (maanantaina)। মাস/বছর → inessive (elokuussa)। দিনের ভাগ → adessive (aamulla)। স্থিতিকাল → পার্টিটিভ।",
  "Day in the wrong case: 'maanantaissa' → maanantaina; 'aamussa' → aamulla.": "বার ভুল কারকে: 'maanantaissa' → maanantaina; 'aamussa' → aamulla।",
  "frozen adverbs, no case": "স্থির ক্রিয়াবিশেষণ, কোনো কারক নেই",
  "adessive, but 'öisin' = plural habit": "adessive, তবে 'öisin' = বহুবচনে অভ্যাস",
  "recurring time: plural instructive": "পুনরাবৃত্ত সময়: বহুবচন instructive",
  "Clitic particles (-kin, -kaan, -han…)": "ক্লিটিক অনুসর্গ (-kin, -kaan, -han…)",
  "Small clitics at the end of a word shift the tone: -kin ('too': minäkin = me too), -kaan/-kään ('not either': en minäkään), -han/-hän (softening/'you know'), -pa/-pä (emphasis: onpa kaunis = how beautiful), -kO (question: tuletko).": "শব্দের শেষে ছোট ছোট ক্লিটিক সুর বদলে দেয়: -kin ('ও/-ও': minäkin = আমিও), -kaan/-kään ('-ও না': en minäkään), -han/-hän (নরম করা / 'জানোই তো'), -pa/-pä (জোর: onpa kaunis = কী সুন্দর!), -kO (প্রশ্ন: tuletko)।",
  "I speak Finnish too": "আমিও ফিনিশ বলি",
  "I don't know either": "আমিও জানি না",
  "how cold it is today": "আজ কী ঠান্ডা!",
  "-kin = also; -kaan = not either; -kO = question.": "-kin = -ও; -kaan = -ও না; -kO = প্রশ্ন।",
  "Clitics always come LAST, after the case and possessive endings (talossanikin). -kin turns into -kaan in the negative.": "ক্লিটিক সবসময় সবার শেষে বসে — কারক ও অধিকার-প্রত্যয়েরও পরে (talossanikin)। নাবাচকে -kin হয়ে যায় -kaan।",
  "-kin in a negative: 'en minäkin' → en minäkään.": "নাবাচকে -kin: 'en minäkin' → en minäkään।",
  "clitic comes last, after everything": "ক্লিটিক সবার শেষে, সবকিছুর পরে",
  "chosen by vowel harmony": "স্বরসঙ্গতি অনুযায়ী বেছে নেওয়া হয়",
  "Questions: -ko/-kö and question words": "প্রশ্ন: -ko/-kö এবং প্রশ্নবাচক শব্দ",
  "A yes/no question is made with the suffix -ko/-kö on the questioned word, moved to the front: Puhutko suomea? = Do you speak Finnish? A wh-question begins with a question word: mikä, kuka, missä, milloin, miksi, miten.": "হ্যাঁ/না প্রশ্ন গঠিত হয় যে শব্দটি নিয়ে প্রশ্ন, তার সঙ্গে -ko/-kö প্রত্যয় যোগ করে এবং শব্দটিকে সামনে এনে: Puhutko suomea? = তুমি কি ফিনিশ বলো? প্রশ্নবাচক প্রশ্ন শুরু হয় প্রশ্নবাচক শব্দ দিয়ে: mikä, kuka, missä, milloin, miksi, miten।",
  "Do you speak Finnish?": "তুমি কি ফিনিশ বলো?",
  "Where do you live?": "তুমি কোথায় থাকো?",
  "Why isn't he coming?": "সে আসছে না কেন?",
  "-ko/-kö on the verb → yes/no. Question word → information.": "ক্রিয়ায় -ko/-kö → হ্যাঁ/না। প্রশ্নবাচক শব্দ → তথ্য।",
  "Yes/no question: attach -ko/-kö to the verb and move it first (Puhutko…?). A question word comes first.": "হ্যাঁ/না প্রশ্ন: ক্রিয়ার সঙ্গে -ko/-kö যোগ করে সেটিকে প্রথমে আনুন (Puhutko…?)। প্রশ্নবাচক শব্দ সবার আগে বসে।",
  "Forgetting -ko: 'Sinä puhut suomea?' → Puhutko sinä suomea? Choose -ko/-kö by vowel harmony.": "-ko ভুলে যাওয়া: 'Sinä puhut suomea?' → Puhutko sinä suomea? -ko/-kö বেছে নিন স্বরসঙ্গতি অনুযায়ী।",
  "irregular declension": "অনিয়মিত রূপ-পরিবর্তন",
  "Sentence types: simple, compound, complex": "বাক্যের ধরন: সরল, যৌগিক, জটিল",
  "A simple sentence has one predicate. A compound sentence joins two main clauses with a coordinating conjunction: ja, mutta, tai, vai, vaan. A complex sentence attaches a subordinate clause to a main clause with a subordinating conjunction or pronoun: että, koska, jos, kun, joka.": "সরল বাক্যে একটিই বিধেয় থাকে। যৌগিক বাক্য দুটি প্রধান খণ্ডবাক্যকে জোড়ে সমুচ্চয়ী অব্যয় দিয়ে: ja, mutta, tai, vai, vaan। জটিল বাক্যে প্রধান খণ্ডবাক্যের সঙ্গে একটি অধীন খণ্ডবাক্য যুক্ত হয় অধীনতাসূচক অব্যয় বা সর্বনাম দিয়ে: että, koska, jos, kun, joka।",
  "Simple: Liisa is reading a book.": "সরল: Liisa একটি বই পড়ছে।",
  "Compound: Liisa reads, and Pertti watches TV.": "যৌগিক: Liisa পড়ে, আর Pertti টিভি দেখে।",
  "Complex: They are home because it's raining.": "জটিল: তারা বাড়িতে আছে, কারণ বৃষ্টি হচ্ছে।",
  "Simple = 1 verb. Compound = main+main. Complex = main+subordinate.": "সরল = ১টি ক্রিয়া। যৌগিক = প্রধান+প্রধান। জটিল = প্রধান+অধীন।",
  "Compound = two main clauses (ja, mutta…). Complex = main + subordinate (koska, että, jos, kun, joka). Comma before the subordinate clause.": "যৌগিক = দুটি প্রধান খণ্ডবাক্য (ja, mutta…)। জটিল = প্রধান + অধীন (koska, että, jos, kun, joka)। অধীন খণ্ডবাক্যের আগে কমা বসে।",
  "Missing comma or wrong connector: 'Opiskelen suomea koska…' needs a comma: 'Opiskelen suomea, koska…'.": "কমা বাদ পড়া বা ভুল সংযোজক: 'Opiskelen suomea koska…'-তে কমা দরকার: 'Opiskelen suomea, koska…'।",
  "the relative pronoun declines": "সম্বন্ধবাচক সর্বনামটি রূপ বদলায়",
  "refers to a whole clause or a word": "একটি গোটা খণ্ডবাক্য বা একটি শব্দকে নির্দেশ করে",
  "in a conditional 'niin' is optional": "শর্তবাক্যে 'niin' ঐচ্ছিক",
  "The neutral order is SVO: \"Minä luen kirjan\" (I read the book). But Finnish is flexible, because case endings mark the roles — you can move words for emphasis. The known thing (topic) comes first, the new/most important info last. When the clause starts with something other than the subject, the verb comes second: \"Eilen kävin kaupassa.\"": "নিরপেক্ষ ক্রম হলো SVO: \"Minä luen kirjan\" (আমি বইটি পড়ি)। তবে ফিনিশ নমনীয়, কারণ কারক-প্রত্যয়ই ভূমিকা ঠিক করে দেয় — জোর দিতে শব্দ সরানো যায়। পরিচিত বিষয়টি আগে বসে, নতুন/সবচেয়ে গুরুত্বপূর্ণ তথ্য শেষে। খণ্ডবাক্য যদি কর্তা ছাড়া অন্য কিছু দিয়ে শুরু হয়, ক্রিয়া বসে দ্বিতীয় স্থানে: \"Eilen kävin kaupassa.\"",
  "I read the book (neutral SVO)": "আমি বইটি পড়ি (নিরপেক্ষ SVO)",
  "the book I'll read, not the paper (fronted object)": "বইটিই আমি পড়ব, পত্রিকা নয় (কর্ম সামনে আনা)",
  "yesterday I went to the shop (verb second)": "গতকাল আমি দোকানে গিয়েছিলাম (ক্রিয়া দ্বিতীয় স্থানে)",
  "SVO is neutral; the cases allow other orders.": "SVO নিরপেক্ষ; কারকগুলোই অন্য ক্রম সম্ভব করে।",
  "Because cases mark subject and object, word order changes emphasis, not the basic meaning. The end of the clause is the \"weighty\" new-information slot.": "যেহেতু কারকই কর্তা ও কর্ম চিহ্নিত করে, শব্দক্রম বদলালে জোর বদলায়, মূল অর্থ নয়। খণ্ডবাক্যের শেষটাই নতুন তথ্যের \"ভারী\" জায়গা।",
  "English rigidity: when a clause starts with a time or place, the verb comes right after (Eilen kävin…).": "ইংরেজির কড়া ক্রম প্রয়োগ: খণ্ডবাক্য সময় বা স্থান দিয়ে শুরু হলে ক্রিয়া ঠিক তার পরেই বসে (Eilen kävin…)।",
  "yes/no question: verb + -ko first": "হ্যাঁ/না প্রশ্ন: ক্রিয়া + -ko আগে",
  "existential: place first": "অস্তিত্ববাচক বাক্য: স্থান আগে",
  "question word first": "প্রশ্নবাচক শব্দ আগে",
  "Existential clause (there is/are)": "অস্তিত্ববাচক বাক্য (there is/are)",
  "An existential clause says something exists somewhere. The place comes first, the verb is always singular (on), and the subject comes last: \"Pöydällä on kirja\" (there's a book on the table). With a negative or a quantity the subject is in the PARTITIVE: \"Kahvia ei ole\" (there's no coffee), \"Pöydällä on kirjoja.\"": "অস্তিত্ববাচক বাক্য বলে যে কোথাও কিছু আছে। স্থান আগে বসে, ক্রিয়া সবসময় একবচন (on), আর কর্তা বসে শেষে: \"Pöydällä on kirja\" (টেবিলের উপরে একটি বই আছে)। নাবাচক বা পরিমাণ থাকলে কর্তা পার্টিটিভে বসে: \"Kahvia ei ole\" (কফি নেই), \"Pöydällä on kirjoja.\"",
  "there is a book on the table": "টেবিলের উপরে একটি বই আছে",
  "there are many people in Helsinki": "Helsinki-তে অনেক মানুষ আছে",
  "there's no milk in the fridge": "ফ্রিজে কোনো দুধ নেই",
  "Place + on + subject (last).": "স্থান + on + কর্তা (শেষে)।",
  "The verb stays 3rd person singular even with a plural/partitive subject: \"Pöydällä ON kirjoja\" (not ovat). Compare: \"Kirja on pöydällä\" (a specific book) vs. \"Pöydällä on kirja\" (there exists).": "কর্তা বহুবচন বা পার্টিটিভ হলেও ক্রিয়া তৃতীয় পুরুষ একবচনেই থাকে: \"Pöydällä ON kirjoja\" (ovat নয়)। তুলনা করুন: \"Kirja on pöydällä\" (একটি নির্দিষ্ট বই) বনাম \"Pöydällä on kirja\" (কিছু একটা আছে)।",
  "Plural verb: \"Pöydällä ovat kirjoja\" → on kirjoja.": "বহুবচন ক্রিয়া: \"Pöydällä ovat kirjoja\" → on kirjoja।",
  "negative → subject to partitive": "নাবাচক → কর্তা পার্টিটিভে",
  "quantity → partitive": "পরিমাণ → পার্টিটিভ",
  "definite subject → normal order": "নির্দিষ্ট কর্তা → স্বাভাবিক ক্রম",
  "Possessive clause (I have)": "অধিকারবাচক বাক্য (আমার আছে)",
  "Finnish has no everyday verb \"to have\"; possession uses the adessive (-lla/-llä) + olla: \"Minulla on auto\" (I have a car). In the negative the thing owned goes to the PARTITIVE: \"Minulla ei ole autoa.\" Quantity/plural: \"Minulla on kirjoja.\"": "ফিনিশে দৈনন্দিন \"to have\" ক্রিয়া নেই; অধিকার বোঝাতে adessive (-lla/-llä) + olla ব্যবহৃত হয়: \"Minulla on auto\" (আমার একটি গাড়ি আছে)। নাবাচকে অধিকৃত জিনিসটি পার্টিটিভে যায়: \"Minulla ei ole autoa.\" পরিমাণ/বহুবচন: \"Minulla on kirjoja.\"",
  "I have a dog": "আমার একটি কুকুর আছে",
  "he doesn't have time": "তার সময় নেই",
  "we have two children": "আমাদের দুটি সন্তান আছে",
  "Owner in the adessive (-lla) + on.": "মালিক adessive-এ (-lla) + on।",
  "The owner takes -lla/-llä and the verb is always \"on\". In the negative the owned thing goes to the partitive (ei ole autoa). Abstract nouns are often partitive even in the affirmative: minulla on aikaa.": "মালিক নেয় -lla/-llä, আর ক্রিয়া সবসময় \"on\"। নাবাচকে অধিকৃত জিনিসটি পার্টিটিভে যায় (ei ole autoa)। বিমূর্ত বিশেষ্য হ্যাঁ-বাচক বাক্যেও প্রায়ই পার্টিটিভে বসে: minulla on aikaa।",
  "Nominative in the negative: \"minulla ei ole auto\" → autoa.": "নাবাচকে nominative: \"minulla ei ole auto\" → autoa।",
  "abstract/mass → partitive": "বিমূর্ত/বস্তুবাচক → পার্টিটিভ",
  "pronouns in the adessive": "সর্বনাম adessive-এ",
  "Generic clause & the zero person": "সাধারণীকৃত বাক্য ও শূন্য-পুরুষ",
  "A generic clause states a general truth with no specific doer. Two devices: (1) the PASSIVE — \"Suomessa syödään paljon kalaa\" (in Finland people eat a lot of fish). (2) the ZERO PERSON — a 3rd-person singular verb with no subject; it means \"anyone / people in general\": \"Täällä ei saa tupakoida\" (one may not smoke here), \"Ikkunasta näkee merelle\" (from the window you can see the sea), \"Jos tekee töitä, oppii\" (if one works, one learns).": "সাধারণীকৃত বাক্য কোনো নির্দিষ্ট কর্তা ছাড়াই একটি সাধারণ সত্য বলে। দুটি উপায়: (১) কর্মবাচ্য — \"Suomessa syödään paljon kalaa\" (ফিনল্যান্ডে অনেক মাছ খাওয়া হয়)। (২) শূন্য-পুরুষ — কর্তা ছাড়া তৃতীয় পুরুষ একবচনের ক্রিয়া; এর অর্থ \"যে কেউ / সাধারণভাবে মানুষ\": \"Täällä ei saa tupakoida\" (এখানে ধূমপান করা যাবে না), \"Ikkunasta näkee merelle\" (জানালা দিয়ে সমুদ্র দেখা যায়), \"Jos tekee töitä, oppii\" (পরিশ্রম করলে শেখা যায়)।",
  "in Finland people eat rye bread (passive)": "ফিনল্যান্ডে রাই-রুটি খাওয়া হয় (কর্মবাচ্য)",
  "one may not park here (zero person)": "এখানে গাড়ি রাখা যাবে না (শূন্য-পুরুষ)",
  "in a café you can read newspapers (zero person)": "ক্যাফেতে পত্রিকা পড়া যায় (শূন্য-পুরুষ)",
  "Passive = 'one does'; zero person = 3rd person, no subject.": "কর্মবাচ্য = 'কেউ করে'; শূন্য-পুরুষ = তৃতীয় পুরুষ, কর্তা নেই।",
  "The zero person uses a hän-form verb WITHOUT a pronoun and means anyone. Common with modals: voi, saa, pitää, täytyy, and perception verbs (näkee, kuulee).": "শূন্য-পুরুষে hän-রূপের ক্রিয়া বসে সর্বনাম ছাড়া, আর অর্থ হয় 'যে কেউ'। প্রায়ই modal ক্রিয়ার সঙ্গে: voi, saa, pitää, täytyy, এবং ইন্দ্রিয়বাচক ক্রিয়ায় (näkee, kuulee)।",
  "Adding a pronoun: \"sinä voit lukea\" is a specific 'you'; the zero person drops it for the general sense.": "সর্বনাম যোগ করা: \"sinä voit lukea\" মানে নির্দিষ্ট 'তুমি'; সাধারণ অর্থের জন্য শূন্য-পুরুষে সর্বনামটি বাদ যায়।",
  "conditional in the zero person": "শূন্য-পুরুষে শর্তবাক্য",
  "most common with modals": "modal ক্রিয়ার সঙ্গেই সবচেয়ে বেশি",
  "Nominalization (-minen and action nouns)": "বিশেষ্যায়ন (-minen ও কর্মবাচক বিশেষ্য)",
  "Nominalization turns a verb into a noun. The most productive is -minen: opiskella → opiskeleminen ('the studying'). It declines in every case (opiskelemista, opiskelemisesta). There are also fixed action nouns: -us/-ys (harjoitella → harjoitus), -o/-ö (muuttaa → muutto), -nti (tuoda → tuonti). Formal style favours nominalization.": "বিশেষ্যায়ন ক্রিয়াকে বিশেষ্যে পরিণত করে। সবচেয়ে ব্যবহারযোগ্য হলো -minen: opiskella → opiskeleminen ('পড়াশোনা করাটা')। এটি সব কারকে রূপ বদলায় (opiskelemista, opiskelemisesta)। এছাড়া স্থির কর্মবাচক বিশেষ্যও আছে: -us/-ys (harjoitella → harjoitus), -o/-ö (muuttaa → muutto), -nti (tuoda → tuonti)। আনুষ্ঠানিক রীতিতে বিশেষ্যায়ন বেশি চলে।",
  "studying Finnish is fun": "ফিনিশ শেখাটা মজার",
  "I like writing": "আমি লিখতে ভালোবাসি",
  "completing the degree took a year": "ডিগ্রিটি শেষ করতে এক বছর লেগেছিল",
  "-minen turns any verb into a noun.": "-minen যেকোনো ক্রিয়াকে বিশেষ্যে বদলে দেয়।",
